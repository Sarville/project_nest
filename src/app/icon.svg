<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
  </defs>
  <!-- terminal background -->
  <rect width="32" height="32" rx="6" fill="url(#bg)"/>
  <!-- title bar -->
  <rect x="0" y="0" width="32" height="8" rx="6" fill="#1e293b"/>
  <rect x="0" y="4" width="32" height="4" fill="#1e293b"/>
  <!-- traffic lights -->
  <circle cx="6" cy="4" r="1.8" fill="#f87171"/>
  <circle cx="11" cy="4" r="1.8" fill="#fbbf24"/>
  <circle cx="16" cy="4" r="1.8" fill="#4ade80"/>
  <!-- prompt -->
  <text x="4" y="16" font-family="monospace" font-size="5" fill="#818cf8">~/</text>
  <!-- cursor -->
  <rect x="14" y="11.5" width="3.5" height="5" rx="0.5" fill="#c084fc"/>
  <!-- wave -->
  <path d="M4 24 C7 21 9 27 12 24 C15 21 17 27 20 24 C23 21 25 27 28 24" stroke="#38bdf8" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
